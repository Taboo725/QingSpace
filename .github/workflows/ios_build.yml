name: iOS Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app (no codesign)
        run: flutter build ios --no-codesign --release

      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          ditto build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          ditto -c -k --sequesterRsrc --keepParent build/ios/ipa/Payload build/ios/ipa/QingSpace.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: QingSpace-iOS
          path: build/ios/ipa/QingSpace.ipa
          retention-days: 7
          if-no-files-found: error
